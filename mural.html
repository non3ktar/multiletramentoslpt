<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria CLLC - Exposição de Multiletramentos</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg: #020617;
            --card-bg: rgba(15, 23, 42, 0.6);
            --primary: #6366f1;
            --text: #f8fafc;
            --sd1: #3b82f6; --sd2: #10b981; --sd3: #8b5cf6; --sd4: #f43f5e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(244, 63, 94, 0.1) 0%, transparent 40%);
            min-height: 100vh;
        }

        header {
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03);
            color: var(--text);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .filter-btn:hover { transform: translateY(-3px); background: rgba(255,255,255,0.1); }
        .filter-btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
            padding: 2rem 4rem;
            max-width: 1600px;
            margin: 0 auto;
        }

        .art-card {
            background: var(--card-bg);
            border-radius: 32px;
            padding: 2.5rem;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 400px;
            animation: cardAppear 0.8s ease backwards;
        }

        @keyframes cardAppear { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }

        .art-card:hover { transform: scale(1.03); border-color: var(--primary); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        .art-tag {
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 50px;
            width: fit-content;
            margin-bottom: 1.5rem;
        }

        .art-content {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #cbd5e1;
            white-space: pre-wrap;
        }

        .art-footer {
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .art-author { font-weight: 700; font-size: 1rem; color: var(--text); }
        .art-date { font-size: 0.8rem; opacity: 0.4; }

        /* Estilos por série */
        .tag-sd1 { background: var(--sd1); color: white; }
        .tag-sd2 { background: var(--sd2); color: white; }
        .tag-sd3 { background: var(--sd3); color: white; }
        .tag-sd4 { background: var(--sd4); color: white; }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem;
            opacity: 0.5;
        }

        /* Botão Flutuante Slideshow */
        .slideshow-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            transition: 0.3s;
        }
        .slideshow-btn:hover { transform: rotate(90deg); }

        /* Fullscreen Present */
        #presenter {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 5rem; text-align: center;
        }
        #presenter.active { display: flex; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 600px) {
            header h1 { font-size: 2rem; }
            .gallery { padding: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <p style="font-weight: 700; opacity: 0.5; letter-spacing: 5px; margin-bottom: 10px;">EXPOSIÇÃO DIGITAL</p>
        <h1>CLLC: Multiletramentos</h1>
        <div class="filters">
            <button class="filter-btn active" onclick="filterGallery('all', this)">Todas as Obras</button>
            <button class="filter-btn" onclick="filterGallery('sd1', this)">6º Ano</button>
            <button class="filter-btn" onclick="filterGallery('sd2', this)">7º Ano</button>
            <button class="filter-btn" onclick="filterGallery('sd3', this)">8º Ano</button>
            <button class="filter-btn" onclick="filterGallery('sd4', this)">9º Ano</button>
        </div>
    </header>

    <main class="gallery" id="gallery">
        <!-- Obras carregadas do Firebase aparecerão aqui -->
    </main>

    <div class="slideshow-btn" onclick="toggleSlideshow()" title="Modo Apresentação">
        <i data-lucide="play" id="slideshow-icon"></i>
    </div>

    <!-- Tela de Apresentação -->
    <div id="presenter" onclick="toggleSlideshow()">
        <div id="presenter-content"></div>
        <p style="position: absolute; bottom: 50px; opacity: 0.3; font-size: 0.8rem;">Clique em qualquer lugar para sair</p>
    </div>

    <script>
        // --- CONFIGURAÇÃO DO FIREBASE (SÉRGIO, COLE AS MESMAS CHAVES AQUI) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCs6lyzUoZWXpdkuozXUATCQcUOYw3aVtY",
  authDomain: "multiletramentoslpt.firebaseapp.com",
  projectId: "multiletramentoslpt",
  storageBucket: "multiletramentoslpt.firebasestorage.app",
  messagingSenderId: "566842639797",
  appId: "1:566842639797:web:74517893823919d86bc5fc"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        lucide.createIcons();

        let allWorks = [];
        let currentFilter = 'all';

        // Escutar produções
        db.ref('productions').on('value', (snapshot) => {
            allWorks = [];
            snapshot.forEach((series) => {
                const sd = series.key;
                series.forEach((prod) => {
                    allWorks.push({ ...prod.val(), sd });
                });
            });
            renderGallery();
        });

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';
            
            const filtered = currentFilter === 'all' 
                ? allWorks 
                : allWorks.filter(w => w.sd === currentFilter);

            if (filtered.length === 0) {
                gallery.innerHTML = '<div class="empty-state"><h3>Nenhuma obra nesta categoria ainda...</h3></div>';
                return;
            }

            // Ordenar por mais recentes
            filtered.sort((a, b) => b.timestamp - a.timestamp);

            filtered.forEach((work, index) => {
                const date = new Date(work.timestamp).toLocaleDateString();
                const seriesNames = { sd1: '6º Ano', sd2: '7º Ano', sd3: '8º Ano', sd4: '9º Ano' };
                
                gallery.innerHTML += `
                    <div class="art-card" style="animation-delay: ${index * 0.1}s">
                        <div>
                            <div class="art-tag tag-${work.sd}">${seriesNames[work.sd]}</div>
                            <div class="art-content">${work.text || work.msg || work.content}</div>
                        </div>
                        <div class="art-footer">
                            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${work.name}&backgroundColor=b6e3f4" style="width: 40px; border-radius: 50%;">
                            <div>
                                <div class="art-author">${work.name || 'Artista Anônimo'}</div>
                                <div class="art-date">${date}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function filterGallery(sd, btn) {
            currentFilter = sd;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGallery();
        }

        // Slideshow Logic
        let slideshowInterval;
        let slideIndex = 0;

        function toggleSlideshow() {
            const presenter = document.getElementById('presenter');
            const icon = document.getElementById('slideshow-icon');
            
            if (presenter.style.display === 'flex') {
                presenter.classList.remove('active');
                setTimeout(() => presenter.style.display = 'none', 500);
                clearInterval(slideshowInterval);
                icon.setAttribute('data-lucide', 'play');
            } else {
                if (allWorks.length === 0) return alert("Nada para mostrar ainda!");
                presenter.style.display = 'flex';
                setTimeout(() => presenter.classList.add('active'), 10);
                icon.setAttribute('data-lucide', 'square');
                startSlideshow();
            }
            lucide.createIcons();
        }

        function startSlideshow() {
            showNextSlide();
            slideshowInterval = setInterval(showNextSlide, 5000); // 5 segundos por obra
        }

        function showNextSlide() {
            const content = document.getElementById('presenter-content');
            const work = allWorks[slideIndex];
            const seriesNames = { sd1: '6º Ano', sd2: '7º Ano', sd3: '8º Ano', sd4: '9º Ano' };
            
            content.style.opacity = '0';
            setTimeout(() => {
                content.innerHTML = `
                    <div class="art-tag tag-${work.sd}" style="margin: 0 auto 2rem;">${seriesNames[work.sd]}</div>
                    <div class="art-content" style="font-size: 2.5rem; text-align: center;">${work.text || work.msg || work.content}</div>
                    <div class="art-author" style="font-size: 1.5rem; margin-top: 3rem;">— ${work.name || 'Anônimo'}</div>
                `;
                content.style.opacity = '1';
                content.style.transition = 'opacity 1s';
            }, 500);

            slideIndex = (slideIndex + 1) % allWorks.length;
        }
    </script>
</body>
</html>
